<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKK Hunting 2026</title>
<style>
  @font-face {
    font-family: 'GT Flexa';
    src: url('TKK-fonts/GT-Flexa-Standard-Regular.woff2') format('woff2'),
         url('TKK-fonts/GT-Flexa-Standard-Regular.woff') format('woff');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'GT Flexa';
    src: url('TKK-fonts/GT-Flexa-Standard-Bold.woff2') format('woff2'),
         url('TKK-fonts/GT-Flexa-Standard-Bold.woff') format('woff');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'GT Flexa Condensed';
    src: url('TKK-fonts/GT-Flexa-Condensed-Bold.woff2') format('woff2'),
         url('TKK-fonts/GT-Flexa-Condensed-Bold.woff') format('woff');
    font-weight: 700; font-style: normal; font-display: swap;
  }

  :root {
    --green:#00B800; --blue:#3391FF; --orange:#FC470F; --pink:#FF00DB;
    --black:#111; --white:#fff; --bg:#F7F3EC;
    --surface:#fff; --border:#E5E7E4; --border-soft:#EEEFEC; --muted:#A0A3A0; --light:#555;
    --hover:#F5F6F3; --chip:#F0F1EE;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'GT Flexa',sans-serif;background:var(--bg);color:var(--black);line-height:1.5;font-weight:400;-webkit-font-smoothing:antialiased;}
  h1,.card-title,.sector-name,.metric-num{font-family:'GT Flexa Condensed','GT Flexa',sans-serif;font-weight:700;letter-spacing:-0.02em;}

  .page{max-width:1440px;margin:0 auto;padding:40px 24px 80px;}
  .loading{text-align:center;padding:100px 20px;color:var(--muted);font-size:14px;}

  .header{padding:0 8px 28px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:8px;}
  .header-left{flex:1;min-width:260px;}
  .header-label{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .header h1{font-size:clamp(48px,6vw,72px);line-height:0.9;color:var(--black);}
  .header h1 em{font-style:normal;color:var(--orange);}

  .grid{display:grid;grid-template-columns:1fr 1fr 320px;gap:16px;align-items:start;}

  .card{background:var(--surface);border-radius:28px;overflow:hidden;position:relative;border:1px solid var(--border-soft);}
  .card-top{padding:28px 30px 24px;position:relative;}
  .objective-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .obj-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:13px;font-weight:700;color:var(--white);font-family:'GT Flexa Condensed',sans-serif;}
  .obj-tag{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
  .card-title{font-size:30px;line-height:1.05;}
  .card.c-support .card-title{font-size:22px;}

  .kr-list{padding:4px 30px 20px;}
  .kr-row{display:grid;grid-template-columns:20px 1fr 80px 80px;gap:14px;padding:10px 0;border-bottom:1px solid var(--border-soft);align-items:center;}
  .kr-row:first-child{border-top:1px solid var(--border-soft);}
  .kr-row.head{padding:8px 0 6px;border-bottom:1px solid var(--border-soft);border-top:none;}
  .kr-row.head div{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .kr-row.head .kr-col-val,.kr-row.head .kr-col-target{text-align:right;}
  .kr-num{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.05em;}
  .kr-text{font-size:13px;font-weight:500;color:var(--black);}
  .kr-edit{font-size:13px;font-weight:700;color:var(--black);text-align:right;font-variant-numeric:tabular-nums;border:none;background:transparent;width:100%;font-family:inherit;cursor:text;padding:2px 6px;border-radius:4px;}
  .kr-edit:hover{background:var(--hover);}
  .kr-edit:focus{background:var(--hover);outline:2px solid var(--orange);}
  .kr-edit.muted{color:var(--muted);}

  .plan-divider{display:flex;align-items:center;gap:12px;padding:14px 30px 10px;}
  .plan-divider-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
  .plan-divider-line{flex:1;height:1px;background:var(--border-soft);}

  .sector{border-top:1px solid var(--border-soft);}
  .sector:first-of-type{border-top:none;}
  .sector-header{display:flex;align-items:center;gap:12px;padding:14px 30px;cursor:pointer;user-select:none;transition:background 0.12s;}
  .sector-header:hover{background:var(--hover);}
  .sector-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .sector-name{font-size:15px;flex:1;letter-spacing:-0.01em;font-weight:700;}
  .sector-arrow{font-size:10px;color:var(--muted);transition:transform 0.2s;}
  .sector.open .sector-arrow{transform:rotate(90deg);}
  .sector-body{display:none;}
  .sector.open .sector-body{display:block;}
  .sector-content{padding:0 30px 16px 52px;}

  .acc{border-top:1px solid var(--border-soft);}
  .acc:first-child{border-top:none;}
  .acc-header{display:flex;align-items:center;gap:10px;padding:11px 0;cursor:pointer;font-size:13px;font-weight:700;user-select:none;flex:1;}
  .acc-counter{font-size:10px;font-weight:700;color:var(--muted);background:var(--chip);padding:2px 9px;border-radius:99px;margin-left:auto;letter-spacing:0.02em;}
  .acc-header:hover{color:var(--orange);}
  .acc-arrow{font-size:9px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;}
  .acc.open .acc-arrow{transform:rotate(90deg);}
  .acc-body{display:none;padding:2px 0 8px 0;}
  .acc.open .acc-body{display:block;}

  .cm-sub{padding:6px 0 4px 20px;}
  .cm-sub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;margin-top:4px;}
  .cm-list{list-style:none;}
  .cm-list li{display:flex;gap:10px;padding:5px 0;font-size:12.5px;align-items:center;color:var(--black);}
  .item-label{flex:1;cursor:text;padding:2px 4px;border-radius:3px;}
  .item-label:hover{background:var(--hover);}
  .item-label[contenteditable="true"]:focus{background:var(--hover);outline:1px solid var(--orange);}
  .item-delete{opacity:0;font-size:14px;color:var(--muted);cursor:pointer;padding:0 8px;border-radius:3px;transition:opacity 0.1s;line-height:1;}
  .cm-list li:hover .item-delete{opacity:1;}
  .item-delete:hover{color:var(--orange);}
  .mini-check{width:14px;height:14px;border:2px solid #CCCEC9;border-radius:3px;flex-shrink:0;cursor:pointer;transition:all 0.1s;position:relative;}
  .mini-check:hover{border-color:var(--orange);}
  .mini-check.checked{background:var(--green);border-color:var(--green);}
  .mini-check.checked::after{content:'';position:absolute;left:3px;top:0px;width:4px;height:8px;border:solid white;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .add-item{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px;color:var(--muted);cursor:pointer;font-weight:500;}
  .add-item:hover{color:var(--orange);}
  .add-icon{width:14px;height:14px;border:2px dashed #CCCEC9;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#BBB;flex-shrink:0;line-height:1;}
  .add-campaign{padding:10px 0;margin-top:6px;border-top:1px dashed var(--border);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;letter-spacing:0.02em;}
  .add-campaign:hover{color:var(--orange);}

  .card.c-support .card-top{padding-bottom:20px;}
  .support-list{padding:8px 24px 20px;}
  .support-list .cm-list li{padding:8px 0;font-size:13px;border-bottom:1px solid var(--border-soft);}
  .support-list .cm-list li:last-child{border-bottom:none;}
  .support-list .add-item{padding:12px 0 4px;}

  .card.c-sales .obj-num{background:var(--green);}
  .card.c-awareness .obj-num{background:var(--blue);}
  .card.c-support .obj-num{background:var(--pink);}

  .save-indicator{position:fixed;bottom:20px;right:20px;background:var(--black);color:white;padding:10px 16px;border-radius:99px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;}
  .save-indicator.show{opacity:1;}
  .save-indicator.error{background:#CC0000;}

  .footer{text-align:center;font-size:11px;color:var(--muted);padding:32px 0 0;letter-spacing:0.04em;}

  @media(max-width:1200px){
    .grid{grid-template-columns:1fr 1fr;}
    .grid > .card:last-child{grid-column:1/-1;}
  }
  @media(max-width:820px){
    .grid{grid-template-columns:1fr;}
    .grid > .card:last-child{grid-column:auto;}
    .header{padding:28px 24px;}
    .header h1{font-size:34px;}
    .card-top,.sector-content{padding-left:20px;padding-right:20px;}
    .kr-row,.sector-header{padding-left:20px;padding-right:20px;}
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-left">
      <div class="header-label">The Kind Kids · Hunting 2026</div>
      <h1>Hunting <em>OKR's</em></h1>
    </div>
  </div>
  <div id="app"><div class="loading">Laden...</div></div>
  <div class="footer">TKK Hunting · 2026 · Live</div>
</div>

<div class="save-indicator" id="save-indicator">Opgeslagen</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://zewesunhchxboyqimrve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpld2VzdW5oY2h4Ym95cWltcnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzM2MDYsImV4cCI6MjA5MTkwOTYwNn0.R0-GjD0oeoYpyo2FHSsKyhw-mHRaYRH6DqXqAybAljA';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const app = document.getElementById('app');
const indicator = document.getElementById('save-indicator');

let saveTimer;
function showSaved(ok=true) {
  clearTimeout(saveTimer);
  indicator.textContent = ok ? 'Opgeslagen' : 'Fout bij opslaan';
  indicator.classList.toggle('error', !ok);
  indicator.classList.add('show');
  saveTimer = setTimeout(() => indicator.classList.remove('show'), 1500);
}

async function loadData() {
  const [objectives, keyResults, sectors, campaigns, items, opportunities, supporting] = await Promise.all([
    sb.from('objectives').select('*').order('position'),
    sb.from('key_results').select('*').order('position'),
    sb.from('sectors').select('*').order('position'),
    sb.from('campaigns').select('*').order('position'),
    sb.from('items').select('*').order('position'),
    sb.from('opportunities').select('*').order('position'),
    sb.from('supporting_projects').select('*').order('position')
  ]);
  return {
    objectives: objectives.data || [],
    keyResults: keyResults.data || [],
    sectors: sectors.data || [],
    campaigns: campaigns.data || [],
    items: items.data || [],
    opportunities: opportunities.data || [],
    supporting: supporting.data || []
  };
}

const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function itemRow(item) {
  return `<li data-item-id="${item.id}">
    <div class="mini-check ${item.checked?'checked':''}" data-action="toggle-item"></div>
    <div class="item-label" contenteditable="true" data-action="edit-item">${esc(item.label)}</div>
    <span class="item-delete" data-action="delete-item">×</span>
  </li>`;
}

function campaignBlock(camp, itemsForCamp) {
  const orgs = itemsForCamp.filter(i => i.kind === 'org');
  const actions = itemsForCamp.filter(i => i.kind === 'action');
  const generic = itemsForCamp.filter(i => i.kind === 'item');
  const total = itemsForCamp.length;
  const done = itemsForCamp.filter(i => i.checked).length;

  if (camp.kind === 'campaign') {
    return `<div class="acc" data-campaign-id="${camp.id}">
      <div class="acc-header" data-action="toggle-acc">
        <span class="acc-arrow">&#9654;</span>${esc(camp.name)}
        <span class="acc-counter">${done}/${total}</span>
      </div>
      <div class="acc-body">
        <div class="cm-sub">
          <div class="cm-sub-label">Organisaties</div>
          <ul class="cm-list">${orgs.map(itemRow).join('')}</ul>
          <div class="add-item" data-action="add-item" data-kind="org"><div class="add-icon">+</div>toevoegen</div>
        </div>
        <div class="cm-sub">
          <div class="cm-sub-label">Acties</div>
          <ul class="cm-list">${actions.map(itemRow).join('')}</ul>
          <div class="add-item" data-action="add-item" data-kind="action"><div class="add-icon">+</div>actie toevoegen</div>
        </div>
      </div>
    </div>`;
  } else {
    return `<div class="acc" data-campaign-id="${camp.id}">
      <div class="acc-header" data-action="toggle-acc">
        <span class="acc-arrow">&#9654;</span>${esc(camp.name)}
        <span class="acc-counter">${done}/${total}</span>
      </div>
      <div class="acc-body">
        <div class="cm-sub">
          <ul class="cm-list">${generic.map(itemRow).join('')}</ul>
          <div class="add-item" data-action="add-item" data-kind="item"><div class="add-icon">+</div>toevoegen</div>
        </div>
      </div>
    </div>`;
  }
}

function sectorBlock(sector, campaigns, items) {
  const secCampaigns = campaigns.filter(c => c.sector_id === sector.id);
  const isPush = secCampaigns.some(c => c.kind === 'campaign');

  return `<div class="sector" data-sector-id="${sector.id}">
    <div class="sector-header" data-action="toggle-sector">
      <div class="sector-dot" style="background:${sector.color}"></div>
      <div class="sector-name">${esc(sector.name)}</div>
      <span class="sector-arrow">&#9654;</span>
    </div>
    <div class="sector-body">
      <div class="sector-content">
        ${secCampaigns.map(c => campaignBlock(c, items.filter(i => i.campaign_id === c.id))).join('')}
        ${isPush ? `<div class="add-campaign" data-action="add-campaign">+ campagne toevoegen</div>` : ''}
      </div>
    </div>
  </div>`;
}

function render(data) {
  const o1 = data.objectives.find(o => o.code === 'O1');
  const o2 = data.objectives.find(o => o.code === 'O2');
  const krO1 = data.keyResults.filter(k => k.objective_id === o1.id);
  const krO2 = data.keyResults.filter(k => k.objective_id === o2.id);
  const sectorsO1 = data.sectors.filter(s => s.objective_id === o1.id);
  const sectorsO2 = data.sectors.filter(s => s.objective_id === o2.id);

  const renderKR = (kr) => `<div class="kr-row" data-kr-id="${kr.id}">
    <div class="kr-num">KR${kr.position}</div>
    <div class="kr-text">${esc(kr.label)}</div>
    <input class="kr-edit ${kr.target?'':'muted'}" data-field="target" value="${esc(kr.target||'___')}" />
    <input class="kr-edit ${kr.actual?'':'muted'}" data-field="actual" value="${esc(kr.actual||'—')}" />
  </div>`;

  app.innerHTML = `
  <div class="grid">

    <div class="card c-sales" data-obj-id="${o1.id}">
      <div class="card-top">
        <div class="objective-meta">
          <div class="obj-num">1</div>
          <div class="obj-tag">${esc(o1.type)}</div>
        </div>
        <div class="card-title">${esc(o1.title)}</div>
      </div>
      <div class="kr-list">
        <div class="kr-row head"><div></div><div>Key Result</div><div class="kr-col-target">Doel</div><div class="kr-col-val">Actueel</div></div>
        ${krO1.map(renderKR).join('')}
      </div>
      <div class="plan-divider">
        <div class="plan-divider-label">Actieplan per sector</div>
        <div class="plan-divider-line"></div>
      </div>
      ${sectorsO1.map(s => sectorBlock(s, data.campaigns, data.items)).join('')}

      <div class="sector" data-opportunities="true">
        <div class="sector-header" data-action="toggle-sector">
          <div class="sector-dot" style="background:var(--muted)"></div>
          <div class="sector-name">Andere opportuniteiten</div>
          <span class="sector-arrow">&#9654;</span>
        </div>
        <div class="sector-body">
          <div class="sector-content">
            <ul class="cm-list">
              ${data.opportunities.map(o => `<li data-opp-id="${o.id}">
                <div class="mini-check ${o.checked?'checked':''}" data-action="toggle-opp"></div>
                <div class="item-label" contenteditable="true" data-action="edit-opp">${esc(o.label)}</div>
                <span class="item-delete" data-action="delete-opp">×</span>
              </li>`).join('')}
            </ul>
            <div class="add-item" data-action="add-opp"><div class="add-icon">+</div>opportuniteit toevoegen</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card c-awareness" data-obj-id="${o2.id}">
      <div class="card-top">
        <div class="objective-meta">
          <div class="obj-num">2</div>
          <div class="obj-tag">${esc(o2.type)}</div>
        </div>
        <div class="card-title">${esc(o2.title)}</div>
      </div>
      <div class="kr-list">
        <div class="kr-row head"><div></div><div>Key Result</div><div class="kr-col-target">Doel</div><div class="kr-col-val">Actueel</div></div>
        ${krO2.map(renderKR).join('')}
      </div>
      <div class="plan-divider">
        <div class="plan-divider-label">Actieplan per sector</div>
        <div class="plan-divider-line"></div>
      </div>
      ${sectorsO2.map(s => sectorBlock(s, data.campaigns, data.items)).join('')}
    </div>

    <div class="card c-support">
      <div class="card-top">
        <div class="objective-meta">
          <div class="obj-num">+</div>
          <div class="obj-tag">Ondersteunend</div>
        </div>
        <div class="card-title">Projecten</div>
      </div>
      <div class="support-list">
        <ul class="cm-list">
          ${data.supporting.map(s => `<li data-supp-id="${s.id}">
            <div class="mini-check ${s.checked?'checked':''}" data-action="toggle-supp"></div>
            <div class="item-label" contenteditable="true" data-action="edit-supp">${esc(s.label)}</div>
            <span class="item-delete" data-action="delete-supp">×</span>
          </li>`).join('')}
        </ul>
        <div class="add-item" data-action="add-supp"><div class="add-icon">+</div>project toevoegen</div>
      </div>
    </div>

  </div>`;
}

async function handleClick(e) {
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;

  if (action === 'toggle-sector') {
    actionEl.closest('.sector').classList.toggle('open');
    return;
  }
  if (action === 'toggle-acc') {
    actionEl.closest('.acc').classList.toggle('open');
    return;
  }
  if (action === 'toggle-item') {
    const li = actionEl.closest('[data-item-id]');
    const id = +li.dataset.itemId;
    const checked = !actionEl.classList.contains('checked');
    actionEl.classList.toggle('checked', checked);
    const { error } = await sb.from('items').update({ checked }).eq('id', id);
    if (error) { showSaved(false); return; }
    updateCounters(li);
    showSaved();
  }
  if (action === 'toggle-opp') {
    const id = +actionEl.closest('[data-opp-id]').dataset.oppId;
    const checked = !actionEl.classList.contains('checked');
    actionEl.classList.toggle('checked', checked);
    const { error } = await sb.from('opportunities').update({ checked }).eq('id', id);
    showSaved(!error);
  }
  if (action === 'toggle-supp') {
    const id = +actionEl.closest('[data-supp-id]').dataset.suppId;
    const checked = !actionEl.classList.contains('checked');
    actionEl.classList.toggle('checked', checked);
    const { error } = await sb.from('supporting_projects').update({ checked }).eq('id', id);
    showSaved(!error);
  }
  if (action === 'add-item') {
    const campId = +actionEl.closest('.acc').dataset.campaignId;
    const kind = actionEl.dataset.kind;
    const label = prompt(kind === 'action' ? 'Nieuwe actie:' : kind === 'org' ? 'Nieuwe organisatie:' : 'Nieuw item:');
    if (!label) return;
    const { error } = await sb.from('items').insert({ campaign_id: campId, label, kind, position: 999 });
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
  if (action === 'add-campaign') {
    const sectorId = +actionEl.closest('.sector').dataset.sectorId;
    const name = prompt('Naam van de campagne:');
    if (!name) return;
    const { error } = await sb.from('campaigns').insert({ sector_id: sectorId, name, kind: 'campaign', position: 999 });
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
  if (action === 'add-opp') {
    const label = prompt('Nieuwe opportuniteit:');
    if (!label) return;
    const { error } = await sb.from('opportunities').insert({ label, position: 999 });
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
  if (action === 'add-supp') {
    const label = prompt('Nieuw project:');
    if (!label) return;
    const { error } = await sb.from('supporting_projects').insert({ label, position: 999 });
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
  if (action === 'delete-item') {
    if (!confirm('Verwijderen?')) return;
    const id = +actionEl.closest('[data-item-id]').dataset.itemId;
    const { error } = await sb.from('items').delete().eq('id', id);
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
  if (action === 'delete-opp') {
    if (!confirm('Verwijderen?')) return;
    const id = +actionEl.closest('[data-opp-id]').dataset.oppId;
    const { error } = await sb.from('opportunities').delete().eq('id', id);
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
  if (action === 'delete-supp') {
    if (!confirm('Verwijderen?')) return;
    const id = +actionEl.closest('[data-supp-id]').dataset.suppId;
    const { error } = await sb.from('supporting_projects').delete().eq('id', id);
    if (error) { showSaved(false); return; }
    await reload();
    showSaved();
  }
}

function updateCounters(itemLi) {
  const acc = itemLi.closest('.acc');
  if (!acc) return;
  const all = acc.querySelectorAll('.mini-check').length;
  const done = acc.querySelectorAll('.mini-check.checked').length;
  const counter = acc.querySelector('.acc-counter');
  if (counter) counter.textContent = `${done}/${all}`;
}

async function handleBlur(e) {
  const target = e.target;
  if (target.classList.contains('kr-edit')) {
    const row = target.closest('[data-kr-id]');
    const id = +row.dataset.krId;
    const field = target.dataset.field;
    let value = target.value.trim();
    if (value === '___' || value === '—' || value === '') value = null;
    const { error } = await sb.from('key_results').update({ [field]: value }).eq('id', id);
    showSaved(!error);
    target.classList.toggle('muted', !value);
  }
  if (target.dataset.action === 'edit-item') {
    const id = +target.closest('[data-item-id]').dataset.itemId;
    const label = target.textContent.trim();
    if (!label) return;
    const { error } = await sb.from('items').update({ label }).eq('id', id);
    showSaved(!error);
  }
  if (target.dataset.action === 'edit-opp') {
    const id = +target.closest('[data-opp-id]').dataset.oppId;
    const label = target.textContent.trim();
    if (!label) return;
    const { error } = await sb.from('opportunities').update({ label }).eq('id', id);
    showSaved(!error);
  }
  if (target.dataset.action === 'edit-supp') {
    const id = +target.closest('[data-supp-id]').dataset.suppId;
    const label = target.textContent.trim();
    if (!label) return;
    const { error } = await sb.from('supporting_projects').update({ label }).eq('id', id);
    showSaved(!error);
  }
}

function handleKeydown(e) {
  if (e.key === 'Enter' && e.target.getAttribute('contenteditable') === 'true') {
    e.preventDefault();
    e.target.blur();
  }
  if (e.key === 'Enter' && e.target.classList.contains('kr-edit')) {
    e.target.blur();
  }
}

async function reload() {
  const data = await loadData();
  render(data);
}

app.addEventListener('click', handleClick);
app.addEventListener('blur', handleBlur, true);
app.addEventListener('keydown', handleKeydown);

reload().catch(err => {
  console.error(err);
  app.innerHTML = `<div class="loading">Fout bij laden: ${err.message}. Check console.</div>`;
});
</script>
</body>
</html>
